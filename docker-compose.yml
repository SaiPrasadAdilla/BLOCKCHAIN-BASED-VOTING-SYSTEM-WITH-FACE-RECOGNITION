name: voting_application

services:
  mongodb:
    image: mongo:7.0
    container_name: voting-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: app_backend
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongodb-init.js:/docker-entrypoint-initdb.d/mongodb-init.js:ro
    networks:
      - voting-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ethereum:
    image: ethereum/client-go:v1.13.15
    container_name: voting-ethereum
    restart: unless-stopped
    ports:
      - '8545:8545'
      - '30303:30303'
    environment:
      - ETH_NETWORK=${ETHEREUM_NETWORK:-goerli}
    volumes:
      - ethereum_data:/root/.ethereum
    networks:
      - voting-network
    command: >
      --goerli
      --http
      --http.addr=0.0.0.0
      --http.vhosts="*"
      --http.corsdomain="*"
      --ws
      --ws.addr=0.0.0.0
      --ws.origins="*"
      --datadir=/root/.ethereum
      --syncmode=snap
      --http.api=eth,net,web3,debug,txpool
      --ws.api=eth,net,web3,debug,txpool
      --allow-insecure-unlock
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8545/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  face-recognition:
    build:
      context: ./face-recognition-service
      dockerfile: Dockerfile
    container_name: voting-face-recognition
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - face_recognition_data:/app/known_faces
      - face_recognition_models:/app/models
    networks:
      - voting-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voting-app
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '3001:3001'
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URL=mongodb://${MONGO_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017
      - MONGO_DB_NAME=${MONGO_DB:-app_backend}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - secret_key=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRATION=1d
      - BLOCKCHAIN_SERVICE_HOST=0.0.0.0
      - BLOCKCHAIN_SERVICE_PORT=3001
      - FACIAL_RECOGNITION_SERVICE_HOST=0.0.0.0
      - FACIAL_RECOGNITION_SERVICE_PORT=3002
      - ETHEREUM_RPC_URL=http://ethereum:8545
      - ETHEREUM_NETWORK=${ETHEREUM_NETWORK:-goerli}
      - admin_username=admin@admin.com
      - admin_password=4V9GU20PoLRNz%X2qUP&6&8*RoX8C!
      - salt_rounds=10
      - DEFAULT_COMPANY_NAME=Election Commission of India
      - FACE_RECOGNITION_SERVICE_URL=http://face-recognition:8080
    volumes:
      - assets_data:/app/assets
    depends_on:
      mongodb:
        condition: service_healthy
      ethereum:
        condition: service_healthy
      face-recognition:
        condition: service_started
    networks:
      - voting-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voting-frontend
    restart: unless-stopped
    ports:
      - '4200:80'
    depends_on:
      app:
        condition: service_healthy
    networks:
      - voting-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:80/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mongodb_data:
    driver: local
  ethereum_data:
    driver: local
  assets_data:
    driver: local
  face_recognition_data:
    driver: local
  face_recognition_models:
    driver: local

networks:
  voting-network:
    driver: bridge
